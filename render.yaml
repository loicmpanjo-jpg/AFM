services:
  # Service unique combinant API + Worker (Plan Gratuit)
  - type: web
    name: afm-all-in-one
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: ./start_all.sh
    envVars:
      # On demande l'URL de la base de données existante pour éviter le conflit de quota
      - key: DATABASE_URL
        sync: true
      # On demande l'URL Redis existante ou on utilise le Key-Value si disponible
      - key: REDIS_URL
        sync: true
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
