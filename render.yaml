databases:
  - name: afm-db
    databaseName: afm
    user: afm_user
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
    ipAllowList: []   # only reachable from your Render services' private network

services:
  # ── Redis / Key Value (event streams + idempotency support) ─────────
  - type: redis
    name: afm-redis
    plan: free
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: noeviction   # Streams data shouldn't be evicted under memory pressure

  # ── API (FastAPI, gunicorn-free — uvicorn's own multi-worker mode) ───
  - type: web
    name: afm-api
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    # preDeployCommand requires a paid instance type (this blueprint uses
    # `starter`, which qualifies). On the free tier, migrations would need
    # to move into buildCommand instead: append " && alembic upgrade head".
    # preDeployCommand: "alembic upgrade head"
    startCommand: "uvicorn api_gateway.main:app --host 0.0.0.0 --port $PORT --workers ${WEB_CONCURRENCY:-2} --proxy-headers --forwarded-allow-ips='*'"
    envVars:
      - fromGroup: afm-shared
      - key: WEB_CONCURRENCY
        value: "2"

