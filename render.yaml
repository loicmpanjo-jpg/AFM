services:
  # Service unique combinant API + Worker (Plan Gratuit)
  - type: web
    name: afm-all-in-one
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: ./start_all.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afm-db-free
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: afm-redis-free
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: afm-db-free
    plan: free
    region: frankfurt

# Render Key-Value (Redis compatible) avec offre gratuite
keyvalues:
  - name: afm-redis-free
    plan: free
    region: frankfurt
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
