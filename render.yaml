services:
  # Service unique combinant API + Worker (Plan Gratuit)
  - type: web
    name: afm-prod-gateway-v23
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: ./start_all.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afm-db-free
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: afm-redis-free
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
